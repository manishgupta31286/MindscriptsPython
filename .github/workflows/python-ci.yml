name: Run Python Script

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Choose a Python file to run'
        required: true
        default: 'array_operations.py'
        type: choice
        options:
          - array_operations.py
          - employee_analytics.py
          - numpyLesson.py

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selected Python script
        run: |
          python "${{ github.event.inputs.script }}"
